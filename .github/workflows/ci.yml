name: CI

# Backstop for "main is always green". Runs lint + tests on every push/PR.
# Mirrors the local pre-push gate (.githooks/pre-push).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: code · ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        working-directory: code
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest ruff; fi
      - name: Lint
        working-directory: code
        run: ruff check .
      - name: Test
        working-directory: code
        run: python -m pytest -q

  frontend:
    name: web + mobile · typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install + typecheck
        run: |
          npm install
          npm run typecheck --workspaces --if-present
